 # Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASS}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASS}", "-Q", "SELECT 1", "-b", "-C", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sqlserver-setup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    command: /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P ${DB_PASS} -C -Q "IF NOT EXISTS (SELECT * FROM sys.databases WHERE name='olegtest') CREATE DATABASE olegtest"
    restart: "no"

  server:
    build:
      context: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: sqlserver
      DB_USER: sa
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-olegtest}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      sqlserver-setup:
        condition: service_completed_successfully

volumes:
  sqlserver-data:

