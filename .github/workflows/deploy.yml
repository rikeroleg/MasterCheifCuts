name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test
        env:
          JWT_SECRET: ci-test-secret-that-is-long-enough-32chars
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: ci-placeholder
          SPRING_PROFILES_ACTIVE: local

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0273518275

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts:latest \
            .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts:latest

      - name: Normalize Cloud Run env var types
        run: |
          # Remove legacy literal env vars so secret bindings can be applied without type conflicts.
          gcloud run services update masterchefcuts \
            --project gen-lang-client-0273518275 \
            --region us-central1 \
            --remove-env-vars JWT_SECRET,RESEND_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASS \
            --quiet || true

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy masterchefcuts \
            --image us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts:${{ github.sha }} \
            --project gen-lang-client-0273518275 \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout=600 \
            --update-env-vars "SPRING_PROFILES_ACTIVE=prod,RESEND_FROM=${{ secrets.RESEND_FROM }}" \
            --update-secrets "JWT_SECRET=JWT_SECRET:latest" \
            --update-secrets "RESEND_API_KEY=RESEND_API_KEY:latest" \
            --update-secrets "STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --update-secrets "STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --update-secrets "DB_HOST=DB_HOST:latest" \
            --update-secrets "DB_PORT=DB_PORT:latest" \
            --update-secrets "DB_NAME=DB_NAME:latest" \
            --update-secrets "DB_USER=DB_USER:latest" \
            --update-secrets "DB_PASS=DB_PASS:latest" \
            --quiet
