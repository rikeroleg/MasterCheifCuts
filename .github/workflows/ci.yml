name: CI — Develop

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: ./mvnw test
        env:
          JWT_SECRET: ci-test-secret-that-is-long-enough-32chars
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: ci-placeholder
          SPRING_PROFILES_ACTIVE: local
          SENTRY_DSN: ""  # Disabled in CI; Sentry only activates in production
