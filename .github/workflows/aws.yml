# CI/CD Pipeline – MasterChefCuts
#
# ── What this workflow does ────────────────────────────────────────────────────
# 1. CI  : Compile and run tests with Maven (Java 17).
# 2. CD  : Build Docker image, push to Amazon ECR, deploy to Amazon ECS (Fargate).
# 3. S3  : Sync any static/public assets from src/main/resources/static to S3.
# 4. DB  : Schema migrations are applied automatically on startup via
#          spring.jpa.hibernate.ddl-auto=update (application-aws.properties).
#          Replace with Flyway/Liquibase for production-grade migration control.
#
# ── Prerequisites ─────────────────────────────────────────────────────────────
# GitHub Actions secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID          IAM user or role access key
#   AWS_SECRET_ACCESS_KEY      IAM user or role secret key
#
# GitHub Actions variables required (Settings → Variables → Actions):
#   AWS_REGION                 e.g. us-east-2
#   ECR_REPOSITORY             ECR repo name, e.g. masterchefcuts
#   ECS_CLUSTER                ECS cluster name
#   ECS_SERVICE                ECS service name
#   S3_BUCKET                  S3 bucket name for static assets (can be empty
#                              to skip the S3 sync step)
#
# IAM permissions needed by the deploying identity:
#   ecr:GetAuthorizationToken, ecr:BatchCheckLayerAvailability,
#   ecr:GetDownloadUrlForLayer, ecr:BatchGetImage,
#   ecr:InitiateLayerUpload, ecr:UploadLayerPart,
#   ecr:CompleteLayerUpload, ecr:PutImage,
#   ecs:RegisterTaskDefinition, ecs:UpdateService,
#   ecs:DescribeServices, ecs:DescribeTaskDefinition,
#   iam:PassRole (for the task execution role),
#   s3:PutObject, s3:DeleteObject, s3:ListBucket  (for S3 sync)
#
# ── Task definition ───────────────────────────────────────────────────────────
# A template lives at .aws/task-definition.json.
# Replace every ACCOUNT_ID and AWS_REGION placeholder before first deploy:
#   sed -i 's/ACCOUNT_ID/123456789012/g; s/AWS_REGION/us-east-2/g' .aws/task-definition.json
# Then register it once:
#   aws ecs register-task-definition --cli-input-json file://.aws/task-definition.json

name: CI/CD – Build, Test, and Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION:       ${{ vars.AWS_REGION }}
  ECR_REPOSITORY:   ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER:      ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE:      ${{ vars.ECS_SERVICE }}
  ECS_TASK_DEF:     .aws/task-definition.json
  CONTAINER_NAME:   masterchefcuts
  S3_BUCKET:        ${{ vars.S3_BUCKET }}
  STATIC_DIR:       src/main/resources/static

permissions:
  contents: read

# ── Job 1: CI ──────────────────────────────────────────────────────────────────
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: ./mvnw --no-transfer-progress verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

# ── Job 2: CD – ECR + ECS ─────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy on pushes to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render new ECS task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  ${{ env.ECS_TASK_DEF }}
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      - name: Deploy updated task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

# ── Job 3: S3 static assets ───────────────────────────────────────────────────
  deploy-s3:
    name: Sync Static Assets to S3
    runs-on: ubuntu-latest
    needs: build-and-test
    # Run only on main pushes and when S3_BUCKET is configured.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.S3_BUCKET != ''
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync static files to S3
        run: |
          if [ -d "$STATIC_DIR" ]; then
            aws s3 sync "$STATIC_DIR" "s3://$S3_BUCKET/" \
              --delete \
              --cache-control "max-age=86400"
            echo "Static assets synced to s3://$S3_BUCKET/"
          else
            echo "No static directory found at $STATIC_DIR – skipping S3 sync."
          fi
