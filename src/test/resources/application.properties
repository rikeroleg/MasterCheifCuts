# Test environment — override profile so application-local.properties is never loaded
spring.profiles.active=

# Clear context path so MockMvc URLs are root-relative
server.servlet.context-path=

# JWT defaults sufficient for unit tests
app.jwt.secret=test-secret-key-at-least-32-characters-long-for-hmac
app.jwt.expiration-ms=3600000

# Stripe dummy (no real calls in unit tests)
stripe.secret-key=sk_test_dummy

# Mail dummy
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.host=localhost
spring.mail.port=25

# Logging — suppress noisy output during tests
logging.level.root=ERROR
logging.level.com.masterchefcuts=WARN
