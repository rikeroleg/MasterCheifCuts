# ── Local development (SQL Server) ──
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=${DB_NAME:olegtest};encrypt=false;trustServerCertificate=true
spring.datasource.username=${DB_USER:oleg}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
