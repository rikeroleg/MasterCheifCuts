# ── Resend (Email) ──
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:MasterChef Cuts <no-reply@masterchefcuts.com>}

# ── Azure SQL (SQL Server) ──
spring.datasource.url=jdbc:sqlserver://${DB_HOST}:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ── GCP GCS (Listing photos, gcp profile) ──
# Enable with SPRING_PROFILES_ACTIVE=prod,gcp.
gcs.bucket=${GCS_BUCKET:}
gcp.project-id=${GCP_PROJECT_ID:}

# CORS — production domain + Cloud Run frontend service
cors.allowed-origins=https://masterchefcuts.com,https://*.masterchefcuts.com,https://masterchefcuts-ui-810873363497.us-central1.run.app

# Hibernate — validate only in prod; use Flyway for migrations
spring.jpa.hibernate.ddl-auto=validate

# Flyway — baseline on first run against existing databases
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/sqlserver

# Stripe Connect — return URLs must be set via GitHub Actions secrets / env vars; no localhost fallback in prod
# STRIPE_CONNECT_RETURN_URL=https://masterchefcuts.com/profile?connect=success
# STRIPE_CONNECT_REFRESH_URL=https://masterchefcuts.com/profile?connect=refresh
stripe.connect.return-url=${STRIPE_CONNECT_RETURN_URL:https://masterchefcuts.com/profile?connect=success}
stripe.connect.refresh-url=${STRIPE_CONNECT_REFRESH_URL:https://masterchefcuts.com/profile?connect=refresh}
