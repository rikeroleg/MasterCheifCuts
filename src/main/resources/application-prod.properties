# ── AWS SES (Email) ──
spring.mail.host=${MAIL_HOST:email-smtp.us-east-2.amazonaws.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@masterchefcuts.com}

# ── AWS RDS (SQL Server) ──
spring.datasource.url=jdbc:sqlserver://${DB_HOST}:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ── AWS S3 (Listing photos, aws profile) ──
# Keep these for blue/green transition while aws profile is still in use.
aws.s3.bucket=${S3_BUCKET}
aws.region=${AWS_REGION:us-east-2}

# ── GCP GCS (Listing photos, gcp profile) ──
# Enable with SPRING_PROFILES_ACTIVE=prod,gcp.
gcs.bucket=${GCS_BUCKET:}
gcp.project-id=${GCP_PROJECT_ID:}

# CORS — production domain + Cloud Run frontend service
cors.allowed-origins=https://masterchefcuts.com,https://*.masterchefcuts.com,https://masterchefcuts-ui-810873363497.us-central1.run.app

# Hibernate — validate only in prod; use Flyway for migrations
spring.jpa.hibernate.ddl-auto=validate

# Flyway — baseline on first run against existing databases
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/sqlserver

# Stripe Connect — return URLs must be set via AWS Secrets Manager / env vars; no localhost fallback in prod
# STRIPE_CONNECT_RETURN_URL=https://masterchefcuts.com/profile?connect=success
# STRIPE_CONNECT_REFRESH_URL=https://masterchefcuts.com/profile?connect=refresh
stripe.connect.return-url=${STRIPE_CONNECT_RETURN_URL:https://masterchefcuts.com/profile?connect=success}
stripe.connect.refresh-url=${STRIPE_CONNECT_REFRESH_URL:https://masterchefcuts.com/profile?connect=refresh}
