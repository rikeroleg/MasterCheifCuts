spring.application.name=masterchefcuts
server.port=${PORT:8080}

# Active profile: set via env var SPRING_PROFILES_ACTIVE=local  or  prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA common
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Jackson – serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — REQUIRED: set JWT_SECRET env var (min 32 chars). App will fail to start without it.
# There is intentionally no default — omitting this in prod would allow token forgery.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Stripe — set STRIPE_SECRET_KEY env var (sk_test_... for dev, sk_live_... for prod)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Stripe Connect — farmer payouts (15% platform fee, 85% to farmer)
# Set STRIPE_CONNECT_RETURN_URL and STRIPE_CONNECT_REFRESH_URL in production
stripe.connect.return-url=${STRIPE_CONNECT_RETURN_URL:http://localhost:5173/profile?connect=success}
stripe.connect.refresh-url=${STRIPE_CONNECT_REFRESH_URL:http://localhost:5173/profile?connect=refresh}
# Set to false in local dev to skip the onboarding requirement for posting listings
stripe.connect.required=${STRIPE_CONNECT_REQUIRED:true}

# Resend — set RESEND_API_KEY env var. See resend.com/api-keys
resend.api-key=${RESEND_API_KEY:}
# From address — must use a verified domain in production (e.g. no-reply@masterchefcuts.com)
# In Resend sandbox mode, use onboarding@resend.dev
resend.from=${RESEND_FROM:MasterChef Cuts <onboarding@resend.dev>}
# Support inbox — contact form submissions are forwarded here
resend.support-email=${RESEND_SUPPORT_EMAIL:support@masterchefcuts.com}

# GCS — set GCS_BUCKET and optionally GCP_PROJECT_ID in production (gcp profile)
gcs.bucket=${GCS_BUCKET:}
gcp.project-id=${GCP_PROJECT_ID:}

# Multipart — allow up to 6MB to cover the 5MB photo limit plus overhead
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# Actuator — health is public; metrics requires ADMIN auth (see SecurityConfig)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.metrics.enabled=true

# Feature flags
# Disabled locally so you can register without Resend set up; production overrides this to true
features.email-verification=${EMAIL_VERIFICATION_ENABLED:false}

# Frontend base URL — used in email links (verify, reset password)
app.base-url=${APP_BASE_URL:http://localhost:5173}
management.endpoint.health.show-details=never

# Logging — include correlationId (set by CorrelationIdFilter) in every log line
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-no-corr-id}] %-5level %logger{36} - %msg%n

# CORS — defined per profile (local vs prod) to keep localhost out of production
# See application-local.properties and application-prod.properties