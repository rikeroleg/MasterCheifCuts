spring.application.name=masterchefcuts
server.port=8081
server.servlet.context-path=/participant

# Active profile: set via env var SPRING_PROFILES_ACTIVE=local  or  aws
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA common
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Jackson – serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — override via env var in production
app.jwt.secret=${JWT_SECRET:changeme-use-a-long-random-secret-in-production-min32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Stripe — set STRIPE_SECRET_KEY env var (sk_test_... for dev, sk_live_... for prod)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Mail — set MAIL_HOST/MAIL_PORT/MAIL_USER/MAIL_PASS env vars
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@masterchefcuts.com}

# S3 — set S3_BUCKET and AWS_REGION env vars in production (aws profile)
# Leave blank in local dev; photo upload endpoint will return an error when not configured
aws.s3.bucket=${S3_BUCKET:}
aws.region=${AWS_REGION:us-east-2}

# Multipart — allow up to 6MB to cover the 5MB photo limit plus overhead
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB