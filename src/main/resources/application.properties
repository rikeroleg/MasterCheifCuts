spring.application.name=masterchefcuts
server.port=8081
server.servlet.context-path=/participant

# Active profile: set via env var SPRING_PROFILES_ACTIVE=local  or  aws
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA common
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT — override via env var in production
app.jwt.secret=${JWT_SECRET:changeme-use-a-long-random-secret-in-production-min32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Stripe — set STRIPE_SECRET_KEY env var (sk_test_... for dev, sk_live_... for prod)
stripe.secret-key=${STRIPE_SECRET_KEY:}

# Mail — set MAIL_HOST/MAIL_PORT/MAIL_USER/MAIL_PASS env vars
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@masterchefcuts.com}