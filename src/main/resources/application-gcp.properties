# Activate this profile alongside prod in Cloud Run:
# SPRING_PROFILES_ACTIVE=prod,gcp

# ── Cloud SQL for SQL Server ──
# When running on Cloud Run, the Cloud SQL Auth Proxy sidecar exposes
# the instance on localhost:1433.  Set DB_NAME / DB_USER / DB_PASS via
# GCP Secret Manager → Cloud Run env-var bindings.
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Cloud SQL instance connection name (used by Cloud Run --add-cloudsql-instances flag)
# gen-lang-client-0273518275:us-central1:o692745
gcp.cloudsql.instance-connection-name=${CLOUD_SQL_INSTANCE:gen-lang-client-0273518275:us-central1:o692745}

# Object storage (Google Cloud Storage)
gcs.bucket=${GCS_BUCKET}
gcp.project-id=${GCP_PROJECT_ID:}

# Optional: keep AWS keys empty when running on GCP profile
aws.s3.bucket=${S3_BUCKET:}
aws.region=${AWS_REGION:}